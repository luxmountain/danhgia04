services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  product-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: product_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5433:5432"]
    volumes: [product_pgdata:/var/lib/postgresql/data]

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/changeme123
    ports: ["7474:7474", "7687:7687"]
    volumes: [neo4jdata:/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  product-service:
    build: ./product_service
    command: gunicorn config.wsgi:application -b 0.0.0.0:8001
    ports: ["8001:8001"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@product-db:5432/product_service
      DEBUG: "1"
    depends_on: [product-db]
    volumes: ["./product_service:/app", "./data:/app/data"]

  ai-service:
    build: .
    command: gunicorn config.wsgi:application -b 0.0.0.0:8000
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/ai_service
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme123
      REDIS_URL: redis://redis:6379/0
      AI_PRODUCT_SERVICE_URL: http://product-service:8001/api
      DEBUG: "1"
    depends_on: [db, neo4j, redis, product-service]
    volumes: [".:/app", model_data:/app/data]

  gateway:
    build: ./api_gateway
    command: gunicorn config.wsgi:application -b 0.0.0.0:8080
    ports: ["8080:8080"]
    environment:
      GATEWAY_PRODUCT_SERVICE_URL: http://product-service:8001
      GATEWAY_AI_SERVICE_URL: http://ai-service:8000
      DEBUG: "1"
    depends_on: [product-service, ai-service]
    volumes: ["./api_gateway:/app"]

volumes:
  pgdata:
  product_pgdata:
  neo4jdata:
  model_data:
